name: Scheduled HKJC Jobs

on:
  workflow_dispatch:
    inputs:
      job:
        description: Job to run
        required: true
        default: live
        type: choice
        options:
          - backtest
          - optimize
          - live
      live_provider:
        description: Provider for live job (manual only)
        required: false
        default: hkjc
        type: choice
        options:
          - hkjc
          - mock
      edge_threshold:
        description: Edge threshold for live job (manual only)
        required: false
        default: '0.02'
        type: string
      confidence_threshold:
        description: Confidence threshold for live job (manual only)
        required: false
        default: '0.10'
        type: string
      max_alerts:
        description: Max alerts for live job (manual only)
        required: false
        default: '3'
        type: string
  schedule:
    - cron: '30 17 * * *' # 01:30 HKT backtest
    - cron: '30 19 * * *' # 03:30 HKT optimize
    - cron: '*/15 * * * *' # live dry-run loop replacement

concurrency:
  group: scheduled-hkjc-${{ github.event_name }}-${{ github.event.schedule || inputs.job || 'manual' }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_DRY_RUN: ${{ secrets.TELEGRAM_DRY_RUN }}
      LIVE_MODE: ${{ vars.LIVE_MODE }}
      FEATURE_PATH: data/processed/features_phase3_full.csv
      MODEL_PATH: artifacts/model_bundle.pkl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure artifacts folders
        run: |
          mkdir -p artifacts/backtest artifacts/optimizer artifacts/live

      - name: Ensure model bundle for live
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.job == 'live' || github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *' }}
        run: |
          if [ ! -f "$MODEL_PATH" ]; then
            echo "model bundle not found; training model first"
            python -m src.main train \
              --input-path "$FEATURE_PATH" \
              --model-output-path "$MODEL_PATH" \
              --report-output-path artifacts/train_report_gha.json \
              --force
          fi

      - name: Run backtest (scheduled/manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.job == 'backtest' || github.event_name == 'schedule' && github.event.schedule == '30 17 * * *' }}
        run: |
          python -m src.main backtest \
            --input-path "$FEATURE_PATH" \
            --output-dir artifacts/backtest \
            --run-id gha_daily_backtest \
            --force

      - name: Run optimize (scheduled/manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.job == 'optimize' || github.event_name == 'schedule' && github.event.schedule == '30 19 * * *' }}
        run: |
          python -m src.main optimize \
            --input-path "$FEATURE_PATH" \
            --output-dir artifacts/optimizer \
            --run-id gha_daily_optimize \
            --max-runs 120 \
            --use-prediction-cache \
            --force

      - name: Run live one-shot (scheduled/manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.job == 'live' || github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *' }}
        run: |
          python -m src.main live-run-once \
            --provider "${{ github.event_name == 'workflow_dispatch' && inputs.live_provider || 'hkjc' }}" \
            --model-path "$MODEL_PATH" \
            --dry-run \
            --edge-threshold "${{ github.event_name == 'workflow_dispatch' && inputs.edge_threshold || '0.02' }}" \
            --confidence-threshold "${{ github.event_name == 'workflow_dispatch' && inputs.confidence_threshold || '0.10' }}" \
            --max-alerts "${{ github.event_name == 'workflow_dispatch' && inputs.max_alerts || '3' }}" \
            --force

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hkjc-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/backtest/**
            artifacts/optimizer/**
            artifacts/live/**
            artifacts/train_report_gha.json
          if-no-files-found: ignore
