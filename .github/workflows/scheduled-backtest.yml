name: Scheduled Backtest

on:
  workflow_dispatch:
    inputs:
      feature_path:
        description: Feature CSV path
        required: false
        default: data/processed/features_phase3_full.csv
        type: string
      run_id:
        description: Backtest run id
        required: false
        default: gha_daily_backtest
        type: string
  schedule:
    - cron: '30 17 * * *' # 01:30 HKT backtest

concurrency:
  group: scheduled-backtest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FEATURE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.feature_path || 'data/processed/features_phase3_full.csv' }}
      RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || 'gha_daily_backtest' }}
      BACKTEST_DATASET_SCOPE: AUTO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure feature CSV exists
        run: |
          if [ ! -f "$FEATURE_PATH" ]; then
            echo "feature file not found at $FEATURE_PATH; rebuilding from tracked raw data"
            python -m src.main build-features-full \
              --input-path data/raw/real/historical_matches_real_non_hkjc.csv \
              --output-path "$FEATURE_PATH" \
              --force
          fi

      - name: Validate training data source
        run: |
          python .github/scripts/validate_training_data.py \
            --input-path "$FEATURE_PATH" \
            --min-real-rows 300 \
            --strict-after-min-real

      - name: Run backtest
        run: |
          python -m src.main backtest \
            --input-csv-path "$FEATURE_PATH" \
            --output-dir artifacts/backtest \
            --run-id "$RUN_ID" \
            --force

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "telegram secrets not configured; skip failure notification"
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG=$(cat <<EOF
          [GHA FAIL] ${GITHUB_WORKFLOW}
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Actor: ${GITHUB_ACTOR}
          Run: ${RUN_URL}
          EOF
          )

          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 90
          path: |
            artifacts/backtest/**
          if-no-files-found: ignore
