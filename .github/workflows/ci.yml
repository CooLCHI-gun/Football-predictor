name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke and core tests
        run: |
          mkdir -p artifacts/ci
          pytest -q \
            --junitxml=artifacts/ci/pytest-ci.xml \
            tests/test_smoke_cli.py \
            tests/test_backtest.py \
            tests/test_phase4_metrics.py \
            tests/test_phase6_live_cli.py \
            tests/test_proxy_feature_monitor.py

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "telegram secrets not configured; skip failure notification"
            exit 0
          fi

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG=$(cat <<EOF
          [GHA FAIL] ${GITHUB_WORKFLOW}
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Actor: ${GITHUB_ACTOR}
          Run: ${RUN_URL}
          EOF
          )

          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 90
          path: |
            artifacts/ci/**
          if-no-files-found: ignore
