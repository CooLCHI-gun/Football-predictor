name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke and core tests
        run: |
          mkdir -p artifacts/ci
          pytest -q \
            --junitxml=artifacts/ci/pytest-ci.xml \
            tests/test_smoke_cli.py \
            tests/test_backtest.py \
            tests/test_phase4_metrics.py \
            tests/test_phase6_live_cli.py \
            tests/test_proxy_feature_monitor.py

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 90
          path: |
            artifacts/ci/**
          if-no-files-found: ignore
