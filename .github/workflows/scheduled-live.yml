name: Scheduled Live One-Shot

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Live provider
        required: false
        default: hkjc
        type: choice
        options:
          - hkjc
          - mock
      edge_threshold:
        description: Edge threshold
        required: false
        default: '0.02'
        type: string
      confidence_threshold:
        description: Confidence threshold
        required: false
        default: '0.10'
        type: string
      max_alerts:
        description: Max alerts
        required: false
        default: '1'
        type: string
      live_mode:
        description: dry or live
        required: false
        default: dry
        type: choice
        options:
          - dry
          - live
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: scheduled-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FEATURE_PATH: data/processed/features_phase3_full.csv
      LIVE_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.provider || 'hkjc' }}
      LIVE_EDGE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.edge_threshold || '0.02' }}
      LIVE_CONFIDENCE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.confidence_threshold || '0.10' }}
      LIVE_MAX_ALERTS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_alerts || '1' }}
      MODEL_WEIGHT_XGBOOST: '0.70'
      MODEL_WEIGHT_LIGHTGBM: '0.30'
      MODEL_NAME: xgboost
      MODEL_APPROACH: direct_cover
      INCLUDE_MARKET_FEATURES: 'true'
      HKJC_REQUEST_MODE: graphql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore model cache
        uses: actions/cache/restore@v4
        with:
          path: |
            artifacts/model_bundle_xgboost.pkl
            artifacts/model_bundle_lightgbm.pkl
          key: live-model-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            live-model-${{ runner.os }}-${{ github.ref_name }}-

      - name: Resolve day-scoped optimizer run id
        id: resolve_opt_run_id
        run: |
          HKT_DATE=$(TZ=Asia/Hong_Kong date +%Y%m%d)
          OPTIMIZER_RUN_ID="daily_optimize_${HKT_DATE}"
          echo "OPTIMIZER_RUN_ID=$OPTIMIZER_RUN_ID" >> "$GITHUB_ENV"
          echo "optimizer_run_id=$OPTIMIZER_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "optimizer run id resolved: $OPTIMIZER_RUN_ID"

      - name: Restore day optimizer cache
        uses: actions/cache/restore@v4
        with:
          path: |
            artifacts/optimizer/${{ steps.resolve_opt_run_id.outputs.optimizer_run_id }}/**
          key: optimize-best-${{ runner.os }}-${{ github.ref_name }}-${{ steps.resolve_opt_run_id.outputs.optimizer_run_id }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Validate training data source
        run: |
          python .github/scripts/validate_training_data.py \
            --input-path "$FEATURE_PATH" \
            --min-real-rows 300 \
            --strict-after-min-real

      - name: Auto-tune live thresholds from optimizer best params
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ.get("OPTIMIZER_RUN_ID", "").strip()
          best_path = Path("artifacts/optimizer") / run_id / "best_params.json"

          edge = float(os.environ.get("LIVE_EDGE_THRESHOLD", "0.02"))
          confidence = float(os.environ.get("LIVE_CONFIDENCE_THRESHOLD", "0.10"))
          max_alerts = int(float(os.environ.get("LIVE_MAX_ALERTS", "1")))

          if best_path.exists():
              try:
                  payload = json.loads(best_path.read_text(encoding="utf-8"))
                  edge = float(payload.get("min_edge_threshold", edge))
                  confidence = float(payload.get("min_confidence_threshold", confidence))
                  max_alerts = int(float(payload.get("max_alerts", max_alerts)))
              except (OSError, ValueError, json.JSONDecodeError):
                  pass

          edge = max(0.01, min(0.03, edge))
          confidence = max(0.10, min(0.60, confidence))
          max_alerts = max(1, min(3, max_alerts))

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as handle:
              handle.write(f"AUTO_EDGE_THRESHOLD={edge}\n")
              handle.write(f"AUTO_CONFIDENCE_THRESHOLD={confidence}\n")
              handle.write(f"AUTO_MAX_ALERTS={max_alerts}\n")
          print(
              f"auto-tune applied: run_id={run_id or 'N/A'}, best_path={best_path}, "
              f"edge={edge:.4f}, confidence={confidence:.4f}, max_alerts={max_alerts}"
          )
          PY

      - name: Report model blend policy
        run: |
          echo "live model policy: xgboost=${MODEL_WEIGHT_XGBOOST}, lightgbm=${MODEL_WEIGHT_LIGHTGBM}"

      - name: Train XGBoost model when missing
        run: |
          if [ ! -f artifacts/model_bundle_xgboost.pkl ]; then
            python -m src.main train \
              --input-path "$FEATURE_PATH" \
              --model-name xgboost \
              --approach direct_cover \
              --model-output-path artifacts/model_bundle_xgboost.pkl \
              --report-output-path artifacts/train_report_xgboost_gha.json \
              --force
          fi

      - name: Train LightGBM shadow model when missing
        run: |
          if [ ! -f artifacts/model_bundle_lightgbm.pkl ]; then
            python -m src.main train \
              --input-path "$FEATURE_PATH" \
              --model-name lightgbm \
              --approach direct_cover \
              --model-output-path artifacts/model_bundle_lightgbm.pkl \
              --report-output-path artifacts/train_report_lightgbm_gha.json \
              --force
          fi

      - name: Run HKJC GraphQL live one-shot
        id: run_live_primary
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LIVE_FLAG="--dry-run"
          export TELEGRAM_DRY_RUN="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_mode }}" = "live" ]; then
            LIVE_FLAG="--live"
            export TELEGRAM_DRY_RUN="false"
          fi

          python -m src.main live-run-once \
            --provider "$LIVE_PROVIDER" \
            --model-path artifacts/model_bundle_xgboost.pkl \
            $LIVE_FLAG \
            --edge-threshold "$AUTO_EDGE_THRESHOLD" \
            --confidence-threshold "$AUTO_CONFIDENCE_THRESHOLD" \
            --max-alerts "$AUTO_MAX_ALERTS" \
            --output-dir artifacts/live \
            --force

      - name: Fallback live one-shot with conservative thresholds
        if: steps.run_live_primary.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LIVE_FLAG="--dry-run"
          export TELEGRAM_DRY_RUN="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_mode }}" = "live" ]; then
            LIVE_FLAG="--live"
            export TELEGRAM_DRY_RUN="false"
          fi

          python -m src.main live-run-once \
            --provider "$LIVE_PROVIDER" \
            --model-path artifacts/model_bundle_xgboost.pkl \
            $LIVE_FLAG \
            --edge-threshold 0.02 \
            --confidence-threshold 0.10 \
            --max-alerts 1 \
            --output-dir artifacts/live \
            --force

      - name: Save model cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            artifacts/model_bundle_xgboost.pkl
            artifacts/model_bundle_lightgbm.pkl
          key: live-model-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 90
          path: |
            artifacts/live/**
            artifacts/train_report_xgboost_gha.json
            artifacts/train_report_lightgbm_gha.json
          if-no-files-found: ignore
